<!-- @dsCard group="Colors" viewport="700x140" name="Borders" subtitle="Hairline hierarchy does most of the separation work" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:16px;background:var(--bg-canvas);display:flex;gap:12px}
  .b{flex:1;height:90px;background:var(--bg-surface);border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:8px;font:var(--text-caption);color:var(--text-secondary)}
</style></head><body>
  <div class="b" style="border:1px solid var(--border-subtle)">subtle</div>
  <div class="b" style="border:1px solid var(--border-default)">default</div>
  <div class="b" style="border:1px solid var(--border-strong)">strong</div>
  <div class="b" style="border:1px solid var(--border-focus);box-shadow:var(--focus-ring)">focus</div>
</body></html>

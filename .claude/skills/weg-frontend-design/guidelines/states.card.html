<!-- @dsCard group="Spacing" viewport="700x150" name="Hover / Press States" subtitle="Lighter fill on hover, heavier fill on press — no scale/shrink" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:16px;background:var(--bg-canvas);display:flex;gap:16px;font-family:var(--font-sans)}
  .row{flex:1;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:16px;text-align:center;font:var(--text-body-sm);color:var(--text-secondary)}
</style></head><body>
  <div class="row" style="background:var(--bg-surface)">rest</div>
  <div class="row" style="background:var(--bg-surface-hover);border-color:var(--border-strong)">hover</div>
  <div class="row" style="background:var(--bg-surface-active);border-color:var(--border-strong);color:var(--text-primary)">active/pressed</div>
</body></html>

<!-- @dsCard group="Spacing" viewport="700x160" name="Density in Use" subtitle="Tight page gutters, generous internal breathing room" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:0;background:var(--bg-canvas)}
  .page{padding:var(--space-3);display:flex;gap:var(--space-3)}
  .panel{flex:1;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:var(--space-4)}
  .t{font:var(--text-title-sm);color:var(--text-primary);margin-bottom:var(--space-2)}
  .r{font:var(--text-body-sm);color:var(--text-secondary)}
</style></head><body>
  <div class="page">
    <div class="panel"><div class="t">Posto 1</div><div class="r">Em operação</div></div>
    <div class="panel"><div class="t">Posto 2</div><div class="r">Em alerta</div></div>
    <div class="panel"><div class="t">Posto 3</div><div class="r">Parada</div></div>
  </div>
</body></html>

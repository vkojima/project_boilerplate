<!-- @dsCard group="Type" viewport="700x150" name="Mono — Live Readouts" subtitle="Numeric telemetry, IDs, timestamps always in mono" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;padding:16px;background:var(--bg-canvas);display:flex;gap:20px;align-items:center}
  .box{background:var(--bg-sunken);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:14px 18px;text-align:center}
  .label{font:var(--text-label);color:var(--text-tertiary);text-transform:uppercase;letter-spacing:var(--letter-spacing-label);margin-bottom:6px}
</style></head><body>
  <div class="box"><div class="label">Velocidade</div><div style="font:var(--text-mono-lg);color:var(--text-primary)">1.204 <span style="font:var(--text-mono-sm);color:var(--text-tertiary)">rpm</span></div></div>
  <div class="box"><div class="label">Temperatura</div><div style="font:var(--text-mono-lg);color:var(--status-warning-strong)">86,2 <span style="font:var(--text-mono-sm);color:var(--text-tertiary)">°C</span></div></div>
  <div class="box"><div class="label">ID</div><div style="font:var(--text-mono-md);color:var(--text-secondary)">TC-2201</div></div>
  <div class="box"><div class="label">Timestamp</div><div style="font:var(--text-mono-md);color:var(--text-secondary)">14:32:07</div></div>
</body></html>
